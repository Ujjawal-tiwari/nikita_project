# =============================================================
# Credit Risk Explanation Service - Application Configuration
# =============================================================
# PRIMARY: Groq FREE API (6000 req/day, no credit card!)
# Get your free API key at: https://console.groq.com
# =============================================================

spring:
  ai:
    openai:
      # Groq FREE API Key - get yours at https://console.groq.com
      api-key: ${GROQ_API_KEY:}
      # Groq's OpenAI-compatible endpoint
      base-url: https://api.groq.com/openai
      chat:
        options:
          model: llama-3.1-8b-instant
          temperature: 0.3
          max-tokens: 500
      embedding:
        options:
          model: gemini-embedding-001
      retry:
        max-attempts: 1

server:
  port: 8080

# ---- Custom Credit Risk Configuration ----
credit-risk:

  # Spring AI Chunking configuration
  chunking:
    # Use larger chunks to REDUCE API requests (Free tier is 15 RPM!)
    chunk-size: 800
    chunk-overlap: 200
    min-chunk-size: 100
  # Vector Store / RAG configuration
  vector-store:
    similarity-threshold: 0.5
    top-k: 2
  # Error Handling & Retry configuration
  retry:
    max-attempts: 3
    backoff-delay: 1000
    backoff-multiplier: 2.0
